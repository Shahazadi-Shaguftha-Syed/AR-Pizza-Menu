<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIZZAAR — The Future of Dining</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E8341A;
      --cream: #F5F0E8;
      --dark: #0e0e0e;
      --muted: #555;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at top, rgba(232,52,26,0.13) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 44px;
      text-align: center;
    }

    /* TOP */
    .top { display: flex; flex-direction: column; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(232,52,26,0.45);
      color: var(--red);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 22px;
      animation: fadeUp 0.5s ease both;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(88px, 24vw, 156px);
      line-height: 0.85;
      letter-spacing: 0.03em;
      animation: fadeUp 0.5s 0.08s ease both;
    }
    .brand span { color: var(--red); }

    .tagline {
      margin-top: 14px;
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 0.5s 0.16s ease both;
    }

    /* MIDDLE */
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.5s 0.24s ease both;
    }

    .divider {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(232,52,26,0.35), transparent);
      margin: 20px auto;
    }

    .section-label {
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.02em;
      line-height: 1.6;
      max-width: 280px;
    }

    .steps {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .step-num {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(232,52,26,0.4);
      color: var(--red);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    .step-text {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      max-width: 68px;
      line-height: 1.5;
    }

    /* CTA */
    .cta-wrap {
      width: 100%;
      max-width: 340px;
      animation: fadeUp 0.5s 0.32s ease both;
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 17px;
      background: var(--red);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .cta-btn:hover {
      background: #c82e15;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,52,26,0.35);
    }
    .cta-btn:active { transform: translateY(0); }

    .cta-sub {
      margin-top: 11px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- TOP -->
    <div class="top">
      <div class="pill">✦ WebAR · No App Required</div>
      <h1 class="brand">PIZZA<span>AR</span></h1>
      <p class="tagline">The Future of Dining</p>
    </div>

    <!-- MIDDLE -->
    <div class="middle">
      <div class="divider"></div>
      <p class="section-label">Scan the marker. Watch your pizza come alive. 🍕</p>
      <div class="divider"></div>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <p class="step-text">Tap Launch AR</p>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <p class="step-text">Allow camera access</p>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <p class="step-text">Scan marker & order</p>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
      <a href="index.html"
         class="cta-btn"
         onclick="sessionStorage.setItem('launched','1')">
        Launch AR Experience
      </a>
      <p class="cta-sub">Best on mobile · Camera permission required</p>
    </div>

  </div>
</body>
</html>
