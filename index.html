<!DOCTYPE html>
<html>

<head>
  <title>AR Pizza Menu | Premium Experience</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <script>
    // Enforce landing page first
    if (sessionStorage.getItem('launched') !== '1') {
      window.location.href = 'landing.html';
    }
  </script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- A-Frame and AR.js -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />

  <!-- Sweetalert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.2.9/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.2.9/firebase-firestore.js"></script>

  <script>
    // Firebase config remains for user reference, but we'll use a fallback
    const firebaseConfig = {
      apiKey: "AIzaSyBADRyBSQXMP9qvtPwgTysjgODsroyirBA",
      authDomain: "food-ordering-3fcc0.firebaseapp.com",
      projectId: "food-ordering-3fcc0",
      storageBucket: "food-ordering-3fcc0.appspot.com",
      messagingSenderId: "584297250161",
      appId: "1:584297250161:web:eb53f42b38af9595fd4ad0"
    };
  
    // Initialize Firebase
    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.warn("Firebase initialization failed, using local data.");
    }
  </script>

  <!-- Local StyleSheet -->
  <link href="./style.css" rel="stylesheet" />

  <!--Js Files-->
  <script src="./js/data.js"></script>
  <script src="./js/markerHandler.js"></script>
  <script src="./js/addMarkers.js"></script>
  <script src="./js/addButtons.js"></script>

</head>

<body style="overflow: hidden; font-family: 'Outfit', sans-serif;">
  
  <div class="header-overlay">
    <div class="logo-container">
      <h1 class="brand-title">PIZZA<span>AR</span></h1>
      <p class="brand-subtitle">The Future of Dining</p>
    </div>
  </div>

  <a-scene id="main-scene" vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; 
      sourceWidth:1280; sourceHeight:960; 
      displayWidth: 1280; displayHeight: 960; 
      debugUIEnabled: false;" gesture-detector create-markers create-buttons>
    
    <a-assets>
      <a-asset-item id="pizza-model" src="assets/pizza/scene.gltf"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

  <div id="button-div" class="action-container"></div>

  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <p>Preparing the kitchen...</p>
  </div>

  <script>
    window.addEventListener('load', () => {
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loading-screen').style.display = 'none';
        }, 500);
      });
    });
  </script>

</body>

</html>
